services:
  - type: web
    name: gpu-router-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 serve_proxy.py
    envVars:
      - key: STARLIGHT_BACKEND
        value: https://gpu-router-starlight.onrender.com
      - key: STARLIGHT_BACKEND_HOSTPORT
        fromService:
          name: gpu-router-starlight
          type: web
          property: hostport
      - key: DB_BACKEND
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: gpu-router-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"

  - type: web
    name: gpu-router-starlight
    runtime: node
    plan: free
    rootDir: services/starlight_mini_test
    buildCommand: npm ci
    startCommand: npm run serve
    envVars:
      - key: ALLOW_REAL_SUBMIT
        value: "1"
      - key: STARLIGHT_USERNAME
        value: thzskj_wfeng33_1
      - key: STARLIGHT_PASSWORD
        sync: false
      - key: STARLIGHT_AUTH_REFRESH_INTERVAL_MS
        value: "1800000"

databases:
  - name: gpu-router-db
    plan: free
